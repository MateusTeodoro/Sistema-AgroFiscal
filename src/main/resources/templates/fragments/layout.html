<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head_padrao(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title th:text="${titulo} + ' | AgroFiscal'">AgroFiscal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f8f9fa; }
        main { padding-top: 80px; } 
    </style>
</head>

<body>

    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-success fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-tractor"></i> AgroFiscal
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" 
                    aria-controls="menuPrincipal" aria-expanded="false" aria-label="Alternar navegação">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="/"><i class="bi bi-speedometer2"></i> Painel</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/notas"><i class="bi bi-receipt"></i> Notas Fiscais</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/fornecedores"><i class="bi bi-truck"></i> Fornecedores</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3 ms-lg-3 mt-2 mt-lg-0">
                    <span class="text-light" sec:authorize="isAuthenticated()">
                        <i class="bi bi-person-circle"></i> <span sec:authentication="name">Usuário</span>
                    </span>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-sm btn-outline-light shadow-sm" title="Sair do Sistema">
                            <i class="bi bi-box-arrow-right"></i> Sair
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </div>

</body>
</html>
