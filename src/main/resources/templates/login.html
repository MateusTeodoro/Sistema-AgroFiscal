<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AgroFiscal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-body p-5">
                        
                        <div class="text-center mb-4">
                            <i class="bi bi-tractor display-1 text-success"></i>
                            <h2 class="mt-3 fw-bold text-dark">AgroFiscal</h2>
                            <p class="text-muted">Acesso restrito ao sistema</p>
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger text-center small">
                            E-mail ou senha inválidos.
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success text-center small">
                            Você saiu do sistema em segurança.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-bold text-secondary">E-mail de Acesso</label>
                                <input type="email" id="username" name="username" class="form-control form-control-lg" required autofocus>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold text-secondary">Senha</label>
                                <input type="password" id="password" name="password" class="form-control form-control-lg" required>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100 btn-lg shadow-sm">
                                <i class="bi bi-box-arrow-in-right"></i> Entrar
                            </button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
