<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head_padrao('Novo Fornecedor')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container mb-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h2><i class="bi bi-person-plus text-success"></i> Cadastrar Fornecedor</h2>
            <a href="/fornecedores" class="btn btn-outline-secondary shadow-sm">
                <i class="bi bi-arrow-left"></i> Voltar para Lista
            </a>
        </div>

        <div class="card shadow-sm col-md-8 mx-auto">
            <div class="card-body p-4">
                
                <form th:action="@{/fornecedores/salvar}" th:object="${fornecedor}" method="post">
                    
                    <div class="mb-3">
                        <label for="cnpj" class="form-label fw-bold">CNPJ</label>
                        <input type="text" class="form-control" id="cnpj" th:field="*{cnpj}" 
                               placeholder="00.000.000/0001-00" required maxlength="18">
                    </div>

                    <div class="mb-3">
                        <label for="razaoSocial" class="form-label fw-bold">Razão Social</label>
                        <input type="text" class="form-control" id="razaoSocial" th:field="*{razaoSocial}" 
                               placeholder="Ex: AgroTech Insumos Agrícolas S/A" required maxlength="150">
                    </div>

                    <div class="mb-4">
                        <label for="telefone" class="form-label fw-bold">Telefone / WhatsApp</label>
                        <input type="text" class="form-control" id="telefone" th:field="*{telefone}" 
                               placeholder="(00) 00000-0000" maxlength="20">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg shadow-sm">
                            <i class="bi bi-save"></i> Salvar Fornecedor
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </main>

    <div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
