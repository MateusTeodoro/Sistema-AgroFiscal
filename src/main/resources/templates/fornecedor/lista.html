<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head_padrao('Fornecedores')}"></head>

<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container mb-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h2><i class="bi bi-truck text-success"></i> Gestão de Fornecedores</h2>
            <a href="/fornecedores/novo" class="btn btn-success shadow-sm">
                <i class="bi bi-plus-circle"></i> Novo Fornecedor
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0">
                        <thead class="table-success">
                            <tr>
                                <th>ID</th>
                                <th>CNPJ</th>
                                <th>Razão Social</th>
                                <th>Telefone</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="fornecedor : ${fornecedores}">
                                <td th:text="${fornecedor.id}">1</td>
                                <td th:text="${fornecedor.cnpj}">00.000.000/0001-00</td>
                                <td th:text="${fornecedor.razaoSocial}">AgroTech Insumos</td>
                                <td th:text="${fornecedor.telefone}">(34) 9999-9999</td>
                                <td class="text-center">
                                    <button class="btn btn-sm btn-outline-primary" title="Editar">
                                        <i class="bi bi-pencil-square"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" title="Excluir">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </td>
                            </tr>
                            
                            <tr th:if="${#lists.isEmpty(fornecedores)}">
                                <td colspan="5" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                    Nenhum fornecedor cadastrado na fazenda.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
